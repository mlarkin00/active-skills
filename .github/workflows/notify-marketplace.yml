name: Notify marketplace

# On any push to main, ping the mlarkin00/plugins marketplace to re-mirror this
# repo immediately. The marketplace also polls daily, so this is a latency
# optimization, not a hard dependency — if the token is absent the daily poll
# still picks the change up.
#
# Setup: add a PAT with `repo` scope on mlarkin00/plugins as the Actions secret
# MARKETPLACE_DISPATCH_TOKEN. Without it this job no-ops with a warning.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Ping mlarkin00/plugins to re-sync
        env:
          TOKEN: ${{ secrets.MARKETPLACE_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "::warning::MARKETPLACE_DISPATCH_TOKEN not set — skipping dispatch." \
                 "The marketplace's daily poll will still pick up this change."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/mlarkin00/plugins/dispatches" \
            -d '{"event_type":"active-skills-updated"}')
          echo "dispatch HTTP $code"
          [ "$code" = "204" ]
